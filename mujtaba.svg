<svg fill="none" viewBox="0 0 800 1000" width="800" height="1000" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        .container {
          /* Here is the direct .jpg link to a high-res Milky Way space background */
          background-image: url('https://images.unsplash.com/photo-1506703719100-a0f3a48c0f86?q=80&amp;w=2000&amp;auto=format&amp;fit=crop');
          background-size: cover;
          background-position: center;
          width: 100%;
          height: 1000px;
          display: flex;
          justify-content: center;
          align-items: center;
          font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        .glass-card {
          background: rgba(10, 14, 39, 0.85);
          backdrop-filter: blur(10px);
          border-radius: 15px;
          padding: 40px;
          text-align: center;
          color: #e0e0e0;
          width: 80%;
          max-width: 650px;
          box-shadow: 0 4px 30px rgba(0, 0, 0, 0.7);
          border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .dev-gif {
          width: 400px;
          border-radius: 10px;
          margin: 15px 0 25px 0;
          box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }
        h1 { 
          color: #ffffff; 
          margin: 10px 0; 
          font-size: 2.5em; 
          letter-spacing: 1px;
        }
        h3 { 
          color: #b0b0b0; 
          margin-top: 5px; 
          font-size: 1.1em; 
          font-weight: 500; 
        }
        p { 
          line-height: 1.7; 
          font-size: 1em; 
          color: #d0d0d0; 
          margin-top: 20px;
        }
        .rush-text {
          color: #8892b0; 
          font-family: monospace; 
          font-size: 1.1em;
          margin-bottom: 10px;
        }
        .badges { 
          margin-top: 30px; 
        }
        .badges img { 
          margin: 5px; 
        }
      </style>
      
      <div class="container">
        <div class="glass-card">
          <div class="rush-text">&gt; always in a rush</div>
          
          <img class="dev-gif" src="https://user-images.githubusercontent.com/74038190/212284119-fbfd994d-8c2a-4a07-a75f-84e513833c1c.gif" alt="Coding GIF" />
          
          <h1>Mujtaba Junaid</h1>
          <h3>BS in Artificial Intelligence @ FAST NUCES | Full-Stack Engineer @ Zapply</h3>
          
          <p>Building AI systems, cloud infrastructure, and production-grade backends. I don't chase trends—I chase problems worth solving. Whether it's training state-of-the-art models, orchestrating serverless pipelines, or architecting backends that scale, I like building systems that actually work at production scale.</p>
          
          <div class="badges">
            <img src="https://img.shields.io/badge/LinkedIn-0A66C2?style=for-the-badge&amp;logo=linkedin&amp;logoColor=white" alt="LinkedIn" />
            <img src="https://img.shields.io/badge/GitHub-181717?style=for-the-badge&amp;logo=github&amp;logoColor=white" alt="GitHub" />
            <img src="https://img.shields.io/badge/LeetCode-FFA116?style=for-the-badge&amp;logo=leetcode&amp;logoColor=white" alt="LeetCode" />
          </div>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
