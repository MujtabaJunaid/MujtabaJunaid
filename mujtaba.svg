      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&display=swap');
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: 'Fira Code', monospace; background-color: #0a0e27; }
      .container { width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 40px; }
      .glass { background: rgba(10, 14, 39, 0.7); backdrop-filter: blur(10px); border-radius: 12px; padding: 40px; color: #e0e0e0; border: 1px solid rgba(255, 255, 255, 0.1); }
